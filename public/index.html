<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechNinja </title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="./icons/favicon.ico" type="image/x-icon">


    <link rel="stylesheet" href="./style.css">
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
    <div class="login-box">
        <h2>TechNinja Login</h2>
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Admin Username</label>
                <input id="l-user" type="text" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input id="l-pass" type="password" required>
            </div>
            <button type="submit" class="btn-add" style="width:100%">Login</button>
        </form>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

    <!-- OVERLAY -->
    <div id="overlay" onclick="closeSidebar()"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <img id="shop-logo" src="https://via.placeholder.com/35">
            <span id="logo-text">TechNinja</span>
        </div>

        <nav>
            <div class="nav-item active" onclick="switchView('products', this)">📦 <span>Products</span></div>
            <div class="nav-item" onclick="switchView('repairs', this)">🔧 <span>Repairs</span></div>
            <div class="nav-item" onclick="switchView('orders', this)">🛒 <span>Orders</span></div>
            <div class="nav-item" onclick="switchView('customers', this)">👥 <span>Customers</span></div>
            <div class="nav-item" onclick="switchView('staff', this)">👨‍💼 <span>Staff</span></div>

            <div class="nav-item" onclick="switchView('settings', this)" style="margin-top:20px; border-top:1px solid var(--border)">
                ⚙️ <span>Settings</span>
            </div>

            <div class="nav-item logout-btn" onclick="logout()" style="color:#ef4444">
                🚪 <span>Logout</span>
            </div>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <!-- HEADER -->
        <div class="header">

            <!-- TOGGLE BUTTON -->
            <button onclick="toggleSidebar()" class="menu-btn">☰</button>

            <h1 id="view-title">Products</h1>

            <div class="header-actions">
                <input type="text" id="search-bar" placeholder="Search..." oninput="handleSearch()">
                <button id="add-btn" class="btn-add" onclick="togglePanel(true)">+ Add</button>
            </div>
        </div>

        <!-- CONTENT -->
        <div id="content-area"></div>

    </main>

    <!-- PANEL -->
    <div id="panel">
        <div style="display:flex; justify-content:space-between;">
            <h2>Add Entry</h2>
            <button onclick="togglePanel(false)">✖</button>
        </div>

        <form id="main-form" onsubmit="handleForm(event)">
            <div id="f-fields"></div>
            <button type="submit" class="btn-add" style="width:100%">Save</button>
        </form>
    </div>

</div>

<script src="./script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechNinja Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Ninja Login</h2>
            <form onsubmit="handleLogin(event)">
                <label>User</label><input id="l-user" type="text" required>
                <label>Pass</label><input id="l-pass" type="password" required>
                <button type="submit" class="btn-add" style="width:100%">Login</button>
            </form>
        </div>
    </div>

    <div id="dashboard" style="display:none;">
        <div id="overlay" onclick="togglePanel(false)"></div>
        <aside class="sidebar">
            <div class="logo"><img id="shop-logo" src=""><span id="logo-text">TechNinja</span></div>
            <div class="nav-item active" onclick="switchView('products', this)">📦 Products</div>
            <div class="nav-item" onclick="switchView('repairs', this)">🔧 Repairs</div>
            <div class="nav-item" onclick="switchView('settings', this)" style="margin-top:auto">⚙️ Settings</div>
            <div class="nav-item" onclick="logout()" style="color:red">Logout</div>
        </aside>
        <main class="main">
            <div class="header">
                <h1 id="view-title">Products</h1>
                <button id="add-btn" class="btn-add" onclick="togglePanel(true)">+ Add</button>
            </div>
            <div id="content-area">
                <div class="card">
                    <table>
                        <thead id="table-header"></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>
        </main>
        <div id="panel">
            <h2 id="p-title">Add New</h2>
            <form id="main-form" onsubmit="handleForm(event)">
                <div id="f-fields"></div>
                <button type="submit" id="save-btn" class="btn-add" style="width:100%; margin-top:10px;">Save</button>
            </form>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
